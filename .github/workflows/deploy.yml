# Build the Jupyter Book (with embedded JupyterLite/Pyodide notebooks) and
# deploy the static site to GitHub Pages.
#
# IMPORTANT — this workflow does nothing until the repository is pushed to
# GitHub AND Pages is enabled in the repo settings:
#   Settings -> Pages -> "Build and deployment" -> Source: "GitHub Actions".
# Without that, the deploy-pages step has no Pages site to publish to. The
# build job will still run, but the deploy job will fail until Pages is on.
name: Deploy book to GitHub Pages

on:
  # Auto-deploy on every push to main.
  push:
    branches: [main]
  # Allow a manual run from the Actions tab.
  workflow_dispatch:

# GitHub Pages deployment via OIDC needs these token permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish rather
# than cancelling it (cancelling a deploy mid-flight can leave Pages wedged).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Jupyter Book + the JupyterLite embedding stack. requirements-lite.txt
          # pins the in-browser kernel deps (numpy, otter-grader) that the
          # JupyterLite build bundles into the served WASM environment.
          # Pin jupyter-book to the 1.x (Sphinx) line. Bare `jupyter-book`
          # now installs v2.x (mystmd/Node engine), which does NOT consume
          # _config.yml / _toc.yml / jupyterlite-sphinx and breaks the build.
          pip install "jupyter-book==1.0.4.post1" jupyterlite-sphinx jupyterlite-pyodide-kernel
          if [ -f requirements-lite.txt ]; then pip install -r requirements-lite.txt; fi

      - name: Build the book
        run: |
          jupyter-book build book/
          # Normalize backslash separators in launcher URLs. No-op on Linux
          # (only fires for Windows-built sites), but cheap and idempotent.
          python book/fix_lite_paths.py
          # Wire the pyodide-kernel labextension into the lite build. The
          # jupyter-lite addon does not always discover it from the share/
          # path. Idempotent.
          python book/wire_pyodide_kernel.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Jupyter Book emits the rendered site here.
          path: book/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
