# Build the Jupyter Book + the static landing page and deploy them as one
# site to GitHub Pages.
#
# IMPORTANT: enable Pages in the repo settings before pushing:
#   Settings -> Pages -> "Build and deployment" -> Source: "GitHub Actions".
# Without that, the deploy step has no Pages site to publish to.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Jupyter Book 1.x (pinned: bare `jupyter-book` now installs v2 which
          # is a different engine and ignores _config.yml).
          pip install "jupyter-book==1.0.4.post1" jupyterlite-sphinx jupyterlite-pyodide-kernel
          # Templating for the static landing build.
          pip install "jinja2>=3.1" "pydantic>=2.9" "pydantic-settings>=2.5"
          if [ -f requirements-lite.txt ]; then pip install -r requirements-lite.txt; fi

      - name: Build the Jupyter Book
        run: |
          jupyter-book build book/
          # Normalize backslash separators (no-op on Linux, defensive).
          python book/fix_lite_paths.py
          # Wire the in-browser kernel extension into the lite/ deployment.
          python book/wire_pyodide_kernel.py

      - name: Build the static landing + assemble dist/
        run: |
          python scripts/build_static.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
