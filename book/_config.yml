# Jupyter Book configuration for "Build a Small Language Model From Scratch".
#
# Browser lessons (warm-up + Modules 0-6) embed JupyterLite notebooks that run
# on the Pyodide WASM kernel via the `jupyterlite-sphinx` extension. PyTorch
# lessons (Modules 7-9) link to Google Colab.
#
# Docs: https://jupyterbook.org/customize/config.html

title: Build an SLM From Scratch
author: ""
logo: ""
copyright: ""

only_build_toc_files: true

execute:
  execute_notebooks: "off"

html:
  home_page_in_navbar: true
  use_repository_button: true
  use_issues_button: false
  use_edit_page_button: false
  baseurl: ""
  extra_footer: ""

launch_buttons:
  notebook_interface: "jupyterlab"
  colab_url: "https://colab.research.google.com"

repository:
  url: https://github.com/your-org/foundation-model
  path_to_book: book
  branch: main

parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - substitution

sphinx:
  extra_extensions:
    - jupyterlite_sphinx
  config:
    jupyterlite_dir: "."
    jupyterlite_contents:
      - "../notebooks/s1_tokenizer_warmup.ipynb"
      - "../notebooks/m00_orientation.ipynb"
      - "../notebooks/m01_numpy.ipynb"
      - "../notebooks/m02_neuron.ipynb"
      - "../notebooks/m03_autograd.ipynb"
      - "../notebooks/m04_bigram.ipynb"
      - "../notebooks/m05_mlp_lm.ipynb"
      - "../notebooks/m06_attention.ipynb"
    jupyterlite_silence: false
    html_js_files:
      - gating.js
    html_css_files:
      - custom.css
    html_theme_options:
      default_mode: "dark"
      home_page_in_toc: false
      show_navbar_depth: 1
      show_toc_level: 1
      use_download_button: false
      use_fullscreen_button: false
      logo:
        text: "SLM Course"

exclude_patterns:
  - _build
  - "**.ipynb_checkpoints"
  - Thumbs.db
  - .DS_Store
